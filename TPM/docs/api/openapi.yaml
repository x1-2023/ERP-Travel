openapi: 3.0.3
info:
  title: Promo Master API
  description: |
    Trade Promotion Management System API

    ## Overview
    Promo Master is an enterprise-grade Trade Promotion Management (TPM/TPO) system
    designed for FMCG companies to manage promotions, claims, and financial operations.

    ## Authentication
    All endpoints (except `/auth/login`) require JWT authentication via Bearer token.
    Include the token in the Authorization header: `Authorization: Bearer <token>`

    ## Rate Limiting
    - General endpoints: 100 requests/minute
    - Auth endpoints: 5 requests/minute
    - Heavy operations: 10 requests/minute

    ## Error Handling
    All errors follow a standard format with error codes.
    See the Error Codes section for details.

    ## Pagination
    List endpoints support pagination via `page` and `pageSize` query parameters.
    Default: page=1, pageSize=10, max pageSize=100

  version: 2.0.0
  contact:
    name: API Support
    email: api-support@your-domain.com
  license:
    name: Proprietary

servers:
  - url: https://api.your-domain.com/api
    description: Production
  - url: https://staging-api.your-domain.com/api
    description: Staging
  - url: http://localhost:3000/api
    description: Development

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Promotions
    description: Promotion management (CRUD, workflow)
  - name: Claims
    description: Claim management and approval workflow
  - name: Finance
    description: Financial operations (accruals, deductions, journals)
  - name: Operations
    description: Operational data (delivery, sell tracking, inventory)
  - name: AI
    description: AI-powered insights and recommendations
  - name: BI
    description: Business intelligence and reporting
  - name: System
    description: System health and configuration

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    # ═══════════════════════════════════════════════════════════════════════════
    # COMMON SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════════
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation failed"
        code:
          type: string
          example: "VALIDATION_ERROR"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10

    # ═══════════════════════════════════════════════════════════════════════════
    # USER SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════════
    User:
      type: object
      properties:
        id:
          type: string
          example: "user-001"
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, SALES, FINANCE, VIEWER]
        department:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ═══════════════════════════════════════════════════════════════════════════
    # PROMOTION SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════════
    Promotion:
      type: object
      required:
        - name
        - type
        - startDate
        - endDate
        - budget
        - customerId
      properties:
        id:
          type: string
          example: "promo-001"
        code:
          type: string
          example: "SUMMER-2026-001"
        name:
          type: string
          example: "Summer Promotion 2026"
        description:
          type: string
        type:
          type: string
          enum: [DISCOUNT, BUNDLE, GIFT, REBATE, DISPLAY, VOLUME, LOYALTY]
        status:
          type: string
          enum: [DRAFT, PENDING, APPROVED, ACTIVE, COMPLETED, CANCELLED, REJECTED]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
          example: 500000000
        spentAmount:
          type: number
          example: 125000000
        customerId:
          type: string
        customerName:
          type: string
        fundId:
          type: string
        products:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        approvedBy:
          type: string
        approvedAt:
          type: string
          format: date-time

    PromotionCreate:
      type: object
      required:
        - name
        - type
        - startDate
        - endDate
        - budget
        - customerId
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [DISCOUNT, BUNDLE, GIFT, REBATE, DISPLAY, VOLUME, LOYALTY]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        customerId:
          type: string
        fundId:
          type: string
        products:
          type: array
          items:
            type: string

    # ═══════════════════════════════════════════════════════════════════════════
    # CLAIM SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════════
    Claim:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        promotionId:
          type: string
        promotionName:
          type: string
        customerId:
          type: string
        customerName:
          type: string
        type:
          type: string
          enum: [DISCOUNT, REBATE, DISPLAY, DAMAGE, RETURN, OTHER]
        status:
          type: string
          enum: [DRAFT, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED, PAID, CANCELLED]
        amount:
          type: number
        approvedAmount:
          type: number
        description:
          type: string
        evidenceUrls:
          type: array
          items:
            type: string
        submittedAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
        approvedBy:
          type: string
        rejectionReason:
          type: string
        createdAt:
          type: string
          format: date-time

    # ═══════════════════════════════════════════════════════════════════════════
    # FINANCE SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════════
    Accrual:
      type: object
      properties:
        id:
          type: string
        promotionId:
          type: string
        period:
          type: string
          example: "2026-01"
        estimatedAmount:
          type: number
        actualAmount:
          type: number
        status:
          type: string
          enum: [PENDING, CALCULATED, POSTED, REVERSED]
        journalId:
          type: string
        postedAt:
          type: string
          format: date-time

    Deduction:
      type: object
      properties:
        id:
          type: string
        claimId:
          type: string
        invoiceNumber:
          type: string
        claimAmount:
          type: number
        invoiceAmount:
          type: number
        variance:
          type: number
        status:
          type: string
          enum: [PENDING, MATCHED, DISPUTED, RESOLVED]
        matchedAt:
          type: string
          format: date-time

    Journal:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [ACCRUAL, REVERSAL, SETTLEMENT, ADJUSTMENT]
        reference:
          type: string
        description:
          type: string
        entries:
          type: array
          items:
            type: object
            properties:
              accountCode:
                type: string
              debit:
                type: number
              credit:
                type: number
        status:
          type: string
          enum: [DRAFT, POSTED, REVERSED]
        postedAt:
          type: string
          format: date-time

    # ═══════════════════════════════════════════════════════════════════════════
    # HEALTH CHECK SCHEMA
    # ═══════════════════════════════════════════════════════════════════════════
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                latency:
                  type: number
            memory:
              type: object
              properties:
                status:
                  type: string

  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimitExceeded:
      description: Too many requests
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: "Too many requests"
              retryAfter:
                type: integer
                example: 60

security:
  - bearerAuth: []

paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # AUTHENTICATION
  # ═══════════════════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user and receive JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@your-domain.com"
                password:
                  type: string
                  format: password
            example:
              email: "admin@your-domain.com"
              password: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                      expiresIn:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: User logout
      description: Invalidate current session
      responses:
        '200':
          description: Logout successful

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      description: Returns the authenticated user's profile
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════════════════
  # PROMOTIONS
  # ═══════════════════════════════════════════════════════════════════════════
  /promotions:
    get:
      tags: [Promotions]
      summary: List promotions
      description: Get paginated list of promotions with optional filters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PENDING, APPROVED, ACTIVE, COMPLETED, CANCELLED, REJECTED]
        - name: type
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Search by name or code
          schema:
            type: string
        - name: startDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: startDateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of promotions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Promotion'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [Promotions]
      summary: Create promotion
      description: Create a new promotion (status will be DRAFT)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionCreate'
      responses:
        '201':
          description: Promotion created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Promotion'
        '400':
          $ref: '#/components/responses/ValidationError'

  /promotions/{id}:
    get:
      tags: [Promotions]
      summary: Get promotion by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promotion details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Promotion'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Promotions]
      summary: Update promotion
      description: Update promotion (only DRAFT status can be updated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionCreate'
      responses:
        '200':
          description: Promotion updated
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Promotions]
      summary: Delete promotion
      description: Delete promotion (only DRAFT status can be deleted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promotion deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /promotions/{id}/submit:
    post:
      tags: [Promotions]
      summary: Submit promotion for approval
      description: Change status from DRAFT to PENDING
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promotion submitted

  /promotions/{id}/approve:
    post:
      tags: [Promotions]
      summary: Approve promotion
      description: Change status from PENDING to APPROVED (Manager role required)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promotion approved
        '403':
          $ref: '#/components/responses/Forbidden'

  /promotions/{id}/reject:
    post:
      tags: [Promotions]
      summary: Reject promotion
      description: Change status from PENDING to REJECTED (Manager role required)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Promotion rejected

  # ═══════════════════════════════════════════════════════════════════════════
  # CLAIMS
  # ═══════════════════════════════════════════════════════════════════════════
  /claims:
    get:
      tags: [Claims]
      summary: List claims
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: promotionId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of claims

    post:
      tags: [Claims]
      summary: Create claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [promotionId, amount, type]
              properties:
                promotionId:
                  type: string
                amount:
                  type: number
                type:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Claim created

  /claims/{id}:
    get:
      tags: [Claims]
      summary: Get claim by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Claim details

  /claims/{id}/submit:
    post:
      tags: [Claims]
      summary: Submit claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Claim submitted

  /claims/{id}/approve:
    post:
      tags: [Claims]
      summary: Approve claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Claim approved

  /claims/{id}/reject:
    post:
      tags: [Claims]
      summary: Reject claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Claim rejected

  # ═══════════════════════════════════════════════════════════════════════════
  # FINANCE
  # ═══════════════════════════════════════════════════════════════════════════
  /finance/accruals:
    get:
      tags: [Finance]
      summary: List accruals
      responses:
        '200':
          description: List of accruals

  /finance/accruals/{id}/calculate:
    post:
      tags: [Finance]
      summary: Calculate accrual
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Accrual calculated

  /finance/accruals/{id}/post:
    post:
      tags: [Finance]
      summary: Post accrual to GL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Accrual posted

  /finance/deductions:
    get:
      tags: [Finance]
      summary: List deductions
      responses:
        '200':
          description: List of deductions

  /finance/deductions/{id}/match:
    post:
      tags: [Finance]
      summary: Perform 3-way matching
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Matching result

  /finance/journals:
    get:
      tags: [Finance]
      summary: List GL journals
      responses:
        '200':
          description: List of journals

  # ═══════════════════════════════════════════════════════════════════════════
  # SYSTEM
  # ═══════════════════════════════════════════════════════════════════════════
  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: System unhealthy

  /health/live:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service alive

  /health/ready:
    get:
      tags: [System]
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Service ready
        '503':
          description: Service not ready
