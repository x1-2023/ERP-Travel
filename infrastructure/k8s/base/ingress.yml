# ============================================================
# ERP Ingress — Kong Ingress Controller
# Routes traffic to all ERP services
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-ingress
  namespace: vierp-system
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-prod
    konghq.com/strip-path: "false"
    konghq.com/plugins: rate-limiting,cors,jwt-auth
spec:
  tls:
    - hosts:
        - api.erp.vn
        - app.erp.vn
      secretName: erp-tls
  rules:
    # API Gateway
    - host: api.erp.vn
      http:
        paths:
          - path: /api/v1/hrm
            pathType: Prefix
            backend:
              service:
                name: hrm
                port:
                  number: 80
          - path: /api/v1/crm
            pathType: Prefix
            backend:
              service:
                name: crm
                port:
                  number: 80
          - path: /api/v1/mrp
            pathType: Prefix
            backend:
              service:
                name: mrp
                port:
                  number: 80
          - path: /api/v1/accounting
            pathType: Prefix
            backend:
              service:
                name: accounting
                port:
                  number: 80
          - path: /api/v1/pm
            pathType: Prefix
            backend:
              service:
                name: pm
                port:
                  number: 80
          - path: /api/v1/ecommerce
            pathType: Prefix
            backend:
              service:
                name: ecommerce
                port:
                  number: 80
          - path: /api/v1/master-data
            pathType: Prefix
            backend:
              service:
                name: hrm
                port:
                  number: 80
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80

    # Web App
    - host: app.erp.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
