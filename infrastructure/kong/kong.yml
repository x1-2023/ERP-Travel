_format_version: "3.0"

services:
  - name: mrp-service
    url: http://host.docker.internal:3001
    routes:
      - name: mrp-route
        paths: ["/api/mrp"]
        strip_path: true

  - name: hrm-service
    url: http://host.docker.internal:3002
    routes:
      - name: hrm-route
        paths: ["/api/hrm"]
        strip_path: true

  - name: crm-service
    url: http://host.docker.internal:3003
    routes:
      - name: crm-route
        paths: ["/api/crm"]
        strip_path: true

  - name: tpm-service
    url: http://host.docker.internal:3004
    routes:
      - name: tpm-route
        paths: ["/api/tpm"]
        strip_path: true

  - name: otb-service
    url: http://host.docker.internal:3005
    routes:
      - name: otb-route
        paths: ["/api/otb"]
        strip_path: true

  - name: pm-service
    url: http://host.docker.internal:3006
    routes:
      - name: pm-route
        paths: ["/api/pm"]
        strip_path: true

  - name: acc-service
    url: http://host.docker.internal:3007
    routes:
      - name: acc-route
        paths: ["/api/acc"]
        strip_path: true

  - name: xai-service
    url: http://host.docker.internal:3008
    routes:
      - name: xai-route
        paths: ["/api/excel-ai"]
        strip_path: true

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Authorization, Content-Type, X-Tenant-Id]
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      policy: local
