version: '3.8'

services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: vierp-meilisearch
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-aSampleMasterKeyForDevEnvironment}
      MEILI_NO_ANALYTICS: ${MEILI_NO_ANALYTICS:-true}
      MEILI_LOG_LEVEL: ${MEILI_LOG_LEVEL:-info}
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch-data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vierp-network

volumes:
  meilisearch-data:
    driver: local

networks:
  vierp-network:
    driver: bridge
