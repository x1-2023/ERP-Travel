# ============================================================
# Grafana Dashboard Provisioning (TIP-005, TIP-018)
# Auto-load dashboards from /var/lib/grafana/dashboards/
# ============================================================

apiVersion: 1

providers:
  - name: VietERP Dashboards
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

# Dashboard specifications:
# 1. overview.json        - System Overview (TIP-005)
# 2. per-app.json         - Per-Application Detail (TIP-018)
# 3. database.json        - PostgreSQL Database Monitoring (TIP-018)
# 4. nats.json            - NATS JetStream Monitoring (TIP-018)
# 5. business.json        - Business KPIs & SLO Tracking (TIP-018)
