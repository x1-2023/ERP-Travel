# ============================================================
# Grafana Datasources (TIP-005)
# Auto-provision Prometheus and Loki
# ============================================================

apiVersion: 1

datasources:
  # ==================== Prometheus ====================
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
    editable: true

  # ==================== Loki ====================
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
    editable: true
