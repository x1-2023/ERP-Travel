# ============================================================
# Infrastructure Alerting Rules (TIP-005)
# Database, cache, event bus, and disk alerts
# ============================================================

groups:
  - name: infra_alerts
    interval: 15s
    rules:
      # ==================== PostgreSQL Down ====================
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "PostgreSQL target has been down for 2 minutes"
          dashboard: "http://localhost:3030/d/app-overview"

      # ==================== Redis Down ====================
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Redis is unreachable"
          description: "Redis target has been down for 2 minutes"
          dashboard: "http://localhost:3030/d/app-overview"

      # ==================== NATS Down ====================
      - alert: NATSDown
        expr: up{job="nats"} == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "NATS is unreachable"
          description: "NATS target has been down for 2 minutes"
          dashboard: "http://localhost:3030/d/app-overview"

      # ==================== High Disk Usage ====================
      - alert: DiskUsageHigh
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "High disk usage detected"
          description: "Disk usage is {{ $value | humanizePercentage }} (threshold: 85%)"
          dashboard: "http://localhost:3030/d/app-overview"
