# ============================================================
# Application Alerting Rules (TIP-005)
# Error rate, latency, app availability, memory usage
# ============================================================

groups:
  - name: app_alerts
    interval: 15s
    rules:
      # ==================== Error Rate ====================
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "High error rate in {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          dashboard: "http://localhost:3030/d/app-overview"

      # ==================== High Latency ====================
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)) > 2
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "High P99 latency in {{ $labels.job }}"
          description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 2s)"
          dashboard: "http://localhost:3030/d/app-overview"

      # ==================== Application Down ====================
      - alert: AppDown
        expr: up{job!="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "Application {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for 2 minutes"
          dashboard: "http://localhost:3030/d/app-overview"

      # ==================== High Memory Usage ====================
      - alert: HighMemoryUsage
        expr: |
          (process_resident_memory_bytes / 1024 / 1024 / 1024) > 0.8
        for: 10m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "High memory usage in {{ $labels.job }}"
          description: "Memory usage is {{ $value | humanize }}GB (threshold: 0.8GB)"
          dashboard: "http://localhost:3030/d/app-overview"
