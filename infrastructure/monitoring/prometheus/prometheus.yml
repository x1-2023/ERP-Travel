# ============================================================
# Prometheus Configuration (TIP-005)
# Scrapes all VietERP apps + infrastructure services
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: vierp-prometheus
    environment: development

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts/app-alerts.yml
  - /etc/prometheus/alerts/infra-alerts.yml

scrape_configs:
  # ==================== VietERP Applications ====================
  - job_name: hrm
    static_configs:
      - targets: ["localhost:3001"]
    metrics_path: /api/metrics

  - job_name: hrm-ai
    static_configs:
      - targets: ["localhost:3002"]
    metrics_path: /api/metrics

  - job_name: hrm-unified
    static_configs:
      - targets: ["localhost:3003"]
    metrics_path: /api/metrics

  - job_name: mrp
    static_configs:
      - targets: ["localhost:3005"]
    metrics_path: /api/metrics

  - job_name: accounting
    static_configs:
      - targets: ["localhost:3007"]
    metrics_path: /api/metrics

  - job_name: ecommerce
    static_configs:
      - targets: ["localhost:3008"]
    metrics_path: /api/metrics

  - job_name: otb
    static_configs:
      - targets: ["localhost:3009"]
    metrics_path: /api/metrics

  - job_name: tpm-api
    static_configs:
      - targets: ["localhost:3010"]
    metrics_path: /api/metrics

  - job_name: docs
    static_configs:
      - targets: ["localhost:3011"]
    metrics_path: /api/metrics

  - job_name: crm
    static_configs:
      - targets: ["localhost:3018"]
    metrics_path: /api/metrics

  - job_name: pm
    static_configs:
      - targets: ["localhost:5173"]
    metrics_path: /api/metrics

  - job_name: excelair
    static_configs:
      - targets: ["localhost:5174"]
    metrics_path: /api/metrics

  - job_name: tpm-web
    static_configs:
      - targets: ["localhost:5180"]
    metrics_path: /api/metrics

  # ==================== Infrastructure Services ====================
  - job_name: postgres
    static_configs:
      - targets: ["vierp-postgres:5432"]

  - job_name: redis
    static_configs:
      - targets: ["vierp-redis:6379"]

  - job_name: nats
    static_configs:
      - targets: ["vierp-nats:8222"]
    metrics_path: /metrics
