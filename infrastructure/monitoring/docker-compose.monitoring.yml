# ============================================================
# VietERP Monitoring Stack (TIP-005)
# Services: Prometheus, Grafana, Loki
# Usage: docker compose -f docker-compose.monitoring.yml up -d
# ============================================================

services:
  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: vierp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts/:/etc/prometheus/alerts/:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - erp

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: vierp-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
    volumes:
      - ./grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards/:/var/lib/grafana/dashboards/:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - erp

  # ==================== Loki ====================
  loki:
    image: grafana/loki:2.9.0
    container_name: vierp-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - erp

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  erp:
    external: true
