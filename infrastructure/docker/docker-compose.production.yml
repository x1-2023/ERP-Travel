# ============================================================
# ERP Production Docker Compose
# All services + infrastructure
# ============================================================

version: '3.9'

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: postgresql://erp:${DB_PASSWORD}@postgres:5432/erp_production
  NATS_URL: nats://nats:4222
  REDIS_URL: redis://redis:6379
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_REALM: erp

services:
  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_production
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: >
      -js
      --store_dir /data
      --max_payload 1MB
      --max_connections 1000
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/erp_production
      KC_DB_USERNAME: erp
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  kong:
    image: kong:3.5
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    volumes:
      - ../kong:/kong
    ports:
      - "80:8000"
      - "443:8443"
      - "8001:8001"
    depends_on:
      - hrm
      - crm
      - mrp
      - accounting
      - pm
      - ecommerce

  # ── Application Services ────────────────────────────────────

  hrm:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      args:
        APP_NAME: HRM
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy

  crm:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      args:
        APP_NAME: CRM
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy

  mrp:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      args:
        APP_NAME: MRP
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3003:3000"
    depends_on:
      postgres:
        condition: service_healthy

  accounting:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      args:
        APP_NAME: Accounting
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3007:3000"
    depends_on:
      postgres:
        condition: service_healthy

  pm:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      args:
        APP_NAME: PM
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3005:3000"
    depends_on:
      postgres:
        condition: service_healthy

  ecommerce:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      args:
        APP_NAME: Ecommerce
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3008:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nats_data:
