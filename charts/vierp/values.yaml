postgresql:
  enabled: true
  auth:
    database: vierp
    username: vierp
    password: changeme
  primary:
    persistence:
      enabled: true
      size: 10Gi
  version: "16"

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi

nats:
  enabled: true
  jetstream:
    enabled: true
  persistence:
    enabled: true
    size: 5Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    issuer: letsencrypt-prod

keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: changeme

kong:
  enabled: true
  ingressController:
    enabled: true

healthCheck:
  enabled: true
  path: /api/health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
