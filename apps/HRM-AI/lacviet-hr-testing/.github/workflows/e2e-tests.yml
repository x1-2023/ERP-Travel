# .github/workflows/e2e-tests.yml

name: E2E & Stress Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'e2e'
        type: choice
        options:
          - e2e
          - stress
          - all
      scenario:
        description: 'Stress test scenario'
        required: false
        default: 'load'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike

env:
  NODE_VERSION: '20'
  BASE_URL: ${{ secrets.TEST_BASE_URL || 'http://localhost:3000' }}
  TEST_EMAIL: ${{ secrets.TEST_EMAIL || 'test@company.com' }}
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'TestP@ss123!' }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # E2E TESTS
  # ═══════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.test_type != 'stress' }}
    
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}
      
      - name: Run Playwright tests
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
            --reporter=github,html
        env:
          CI: true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-${{ matrix.shardIndex }}
          path: reports/playwright-html
          retention-days: 30
      
      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-traces-${{ matrix.project }}-${{ matrix.shardIndex }}
          path: reports/test-results
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════
  # MOBILE TESTS
  # ═══════════════════════════════════════════════════════════════════════════════
  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.test_type != 'stress' }}
    needs: e2e-tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright
        run: npx playwright install --with-deps chromium webkit
      
      - name: Run mobile tests
        run: |
          npx playwright test \
            --project=mobile-chrome \
            --project=mobile-safari \
            --reporter=github,html
        env:
          CI: true
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-report
          path: reports/playwright-html
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════
  # STRESS TESTS
  # ═══════════════════════════════════════════════════════════════════════════════
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.test_type == 'stress' || github.event.inputs.test_type == 'all' || github.event_name == 'schedule' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup K6
        uses: grafana/setup-k6-action@v1
      
      - name: Run stress tests
        run: |
          k6 run \
            --env SCENARIO=${{ github.event.inputs.scenario || 'load' }} \
            --env BASE_URL=${{ env.BASE_URL }} \
            tests/stress/k6-stress-test.js
        env:
          K6_OUT: json=reports/k6-results.json
      
      - name: Upload stress test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-report
          path: |
            reports/stress-test-results.json
            reports/stress-test-report.html
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('reports/stress-test-results.json', 'utf8'));
            
            const body = `## 📊 Stress Test Results
            
            | Metric | Value |
            |--------|-------|
            | Total Requests | ${results.requests.total} |
            | Failed Rate | ${results.requests.failed} |
            | Avg Response | ${results.response_times.avg}ms |
            | P95 Response | ${results.response_times.p95}ms |
            | P99 Response | ${results.response_times.p99}ms |
            | Cache Hit Rate | ${results.custom_metrics.cache_hit_rate} |
            
            <details>
            <summary>Endpoint Performance</summary>
            
            | Endpoint | Avg (ms) |
            |----------|----------|
            | Login | ${results.endpoints.login} |
            | Employees | ${results.endpoints.employees} |
            | Dashboard | ${results.endpoints.dashboard} |
            | Leave | ${results.endpoints.leave} |
            | Search | ${results.endpoints.search} |
            
            </details>
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ═══════════════════════════════════════════════════════════════════════════════
  # MERGE REPORTS
  # ═══════════════════════════════════════════════════════════════════════════════
  merge-reports:
    name: Merge Test Reports
    runs-on: ubuntu-latest
    needs: [e2e-tests, mobile-tests]
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-*
      
      - name: Merge reports
        run: |
          npx playwright merge-reports --reporter html ./all-reports
      
      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: merged-playwright-report
          path: playwright-report
          retention-days: 30
      
      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          destination_dir: test-reports

  # ═══════════════════════════════════════════════════════════════════════════════
  # NOTIFY
  # ═══════════════════════════════════════════════════════════════════════════════
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [e2e-tests, stress-tests]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.e2e-tests.result }}
          channel: '#testing'
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
