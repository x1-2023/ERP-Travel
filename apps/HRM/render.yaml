services:
  - type: web
    name: rtr-hrm
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss=false && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rtr-hrm-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://rtr-hrm.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: RENDER_DISK_PATH
        value: /data
      - key: NEXT_PUBLIC_APP_URL
        value: https://rtr-hrm.onrender.com
      - key: NEXT_PUBLIC_SHOW_DEMO
        value: "false"
    disk:
      name: rtr-hrm-storage
      mountPath: /data
      sizeGB: 1

  - type: cron
    name: rtr-hrm-contract-expiry
    runtime: node
    schedule: "0 1 * * *"
    buildCommand: echo "cron"
    startCommand: |
      curl -s -X GET https://rtr-hrm.onrender.com/api/cron/contract-expiry -H "x-cron-secret: $CRON_SECRET"
    envVars:
      - key: CRON_SECRET
        sync: false

databases:
  - name: rtr-hrm-db
    plan: starter
    region: singapore
