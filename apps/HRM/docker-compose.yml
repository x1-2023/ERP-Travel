services:
  app:
    build: .
    container_name: rtr-hrm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://rtr_hrm:rtr_hrm_secret@rtr-hrm-db:5432/rtr_hrm
    volumes:
      - app-data:/data
    networks:
      - internal
      - caddy
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: rtr-hrm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rtr_hrm
      POSTGRES_USER: rtr_hrm
      POSTGRES_PASSWORD: rtr_hrm_secret
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtr_hrm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  app-data:

networks:
  internal:
  caddy:
    external: true
