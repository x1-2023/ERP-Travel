# Render Blueprint for ExcelAI
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: excelai
    runtime: static
    region: singapore
    rootDir: ""
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_OPENAI_API_KEY
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    domains:
      - sheets.prismy.in
