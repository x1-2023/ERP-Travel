services:
  - type: web
    name: vierp-hrm
    runtime: node
    nodeVersion: "20"
    region: singapore
    plan: starter
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vierp-hrm-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://hrm.prismy.in
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - hrm.prismy.in

databases:
  - name: vierp-hrm-db
    databaseName: vierp_hr
    user: vierp
    region: singapore
    plan: free
