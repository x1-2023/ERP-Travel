# .github/workflows/security-tests.yml

name: Security Testing Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - pentest
          - compliance

env:
  NODE_VERSION: '20'
  TEST_BASE_URL: ${{ secrets.TEST_BASE_URL || 'http://localhost:3000' }}

jobs:
  # ════════════════════════════════════════════════════════════════════════════════
  # DEPENDENCY AUDIT
  # ════════════════════════════════════════════════════════════════════════════════
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate audit report
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

  # ════════════════════════════════════════════════════════════════════════════════
  # SECRET SCANNING
  # ════════════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════════
  # SECURITY UNIT TESTS
  # ════════════════════════════════════════════════════════════════════════════════
  security-tests:
    name: Security Unit Tests
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: npm run test:security -- --reporter=verbose
        env:
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: reports/

  # ════════════════════════════════════════════════════════════════════════════════
  # VULNERABILITY SCANNING
  # ════════════════════════════════════════════════════════════════════════════════
  vulnerability-scan:
    name: Vulnerability Scanning
    runs-on: ubuntu-latest
    needs: [security-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vulnerability scanner
        run: npm run scan:security -- ${{ env.TEST_BASE_URL }}
        continue-on-error: true
        env:
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-scan-results
          path: reports/

  # ════════════════════════════════════════════════════════════════════════════════
  # COMPLIANCE CHECK
  # ════════════════════════════════════════════════════════════════════════════════
  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-latest
    needs: [security-tests]
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'compliance' || github.event.inputs.scan_type == 'full'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run compliance checker
        run: npm run check:compliance -- ${{ env.TEST_BASE_URL }}
        env:
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: reports/compliance-*.json

  # ════════════════════════════════════════════════════════════════════════════════
  # PENETRATION TESTS
  # ════════════════════════════════════════════════════════════════════════════════
  pentest:
    name: Penetration Tests
    runs-on: ubuntu-latest
    needs: [security-tests]
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'pentest' || github.event.inputs.scan_type == 'full'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run penetration tests
        run: npm run test:security:pentest -- --reporter=verbose
        env:
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}

  # ════════════════════════════════════════════════════════════════════════════════
  # SECURITY REPORT
  # ════════════════════════════════════════════════════════════════════════════════
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-scan, security-tests, vulnerability-scan]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate combined report
        run: |
          mkdir -p reports
          echo "# Security Scan Report" > reports/SECURITY-REPORT.md
          echo "Generated: $(date)" >> reports/SECURITY-REPORT.md
          echo "" >> reports/SECURITY-REPORT.md

          echo "## Summary" >> reports/SECURITY-REPORT.md
          echo "- Dependency Audit: ${{ needs.dependency-audit.result }}" >> reports/SECURITY-REPORT.md
          echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> reports/SECURITY-REPORT.md
          echo "- Security Tests: ${{ needs.security-tests.result }}" >> reports/SECURITY-REPORT.md
          echo "- Vulnerability Scan: ${{ needs.vulnerability-scan.result }}" >> reports/SECURITY-REPORT.md

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/
