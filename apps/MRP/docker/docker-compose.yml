# docker/docker-compose.yml
# Full stack deployment for VietERP MRP System

version: '3.8'

services:
  # ==================== Application ====================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vierp-mrp-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rtr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rtr_mrp}
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rtr-network
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Database ====================
  db:
    image: postgres:15-alpine
    container_name: vierp-mrp-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rtr}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-rtr_mrp}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rtr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rtr} -d ${POSTGRES_DB:-rtr_mrp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Redis Cache ====================
  redis:
    image: redis:7-alpine
    container_name: vierp-mrp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rtr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== ML Service ====================
  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: vierp-mrp-ml
    restart: unless-stopped
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rtr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rtr_mrp}
      - MODEL_DIR=/app/models
      - DEBUG=${DEBUG:-false}
      - ALLOWED_ORIGINS=http://localhost:3000,http://app:3000
    volumes:
      - ml_models:/app/models
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rtr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Nginx (Optional) ====================
  nginx:
    image: nginx:alpine
    container_name: vierp-mrp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - rtr-network
    profiles:
      - with-nginx

  # ==================== Backup Service ====================
  backup:
    image: postgres:15-alpine
    container_name: vierp-mrp-backup
    restart: "no"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rtr}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-rtr_mrp}
      - PGHOST=db
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ../backups:/backups
      - ../scripts/backup:/scripts:ro
    networks:
      - rtr-network
    entrypoint: ["/bin/sh", "-c"]
    command: ["echo 'Backup service ready. Run: docker-compose run backup /scripts/backup-db.sh'"]
    profiles:
      - backup

networks:
  rtr-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local
