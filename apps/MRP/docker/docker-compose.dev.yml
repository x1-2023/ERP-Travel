# docker/docker-compose.dev.yml
# Development environment with hot reload

version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: vierp-mrp-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://rtr:rtr_dev_password@db:5432/rtr_mrp_dev
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rtr-dev-network

  db:
    image: postgres:15-alpine
    container_name: vierp-mrp-db-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rtr
      - POSTGRES_PASSWORD=rtr_dev_password
      - POSTGRES_DB=rtr_mrp_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - rtr-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtr -d rtr_mrp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vierp-mrp-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rtr-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rtr-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
