# =============================================================================
# VietERP MRP - KUBERNETES CONFIGMAP
# Non-sensitive configuration
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: vierp-mrp-config
  namespace: vierp-mrp
  labels:
    app: vierp-mrp
data:
  # Application
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  
  # Server
  PORT: "3000"
  HOST: "0.0.0.0"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # Features
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  ENABLE_HEALTH_CHECK: "true"
  
  # Cache
  CACHE_TTL: "300"
  
  # Rate Limiting
  RATE_LIMIT_WINDOW: "60000"
  RATE_LIMIT_MAX: "100"
  
  # Pagination
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
