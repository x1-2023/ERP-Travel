# =============================================================================
# VietERP MRP - KUBERNETES SERVICE
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: vierp-mrp
  namespace: vierp-mrp
  labels:
    app: vierp-mrp
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  selector:
    app: vierp-mrp
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: vierp-mrp-headless
  namespace: vierp-mrp
  labels:
    app: vierp-mrp
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: vierp-mrp
  ports:
    - name: http
      port: 3000
      targetPort: 3000
