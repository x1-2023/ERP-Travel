services:
  - type: web
    name: vierp-mrp
    runtime: node
    region: singapore
    plan: standard
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vierp-mrp-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://mrp.prismy.in
      - key: AUTH_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
    domains:
      - mrp.prismy.in

databases:
  - name: vierp-mrp-db
    databaseName: rtr_mrp
    region: singapore
    plan: free
